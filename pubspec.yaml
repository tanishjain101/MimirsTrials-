name: gameed_app
description: MimirsTrials - Conquer the Trials. Master the Code.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.2.1
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.1
  audioplayers: ^6.6.0
  flutter_animate: ^4.5.0
  intl: ^0.20.2
  flutter_dotenv: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/logo.jpeg
    - "assets/WhatsApp Image 2026-03-16 at 09.50.18.jpeg"
    - assets/app_icon.png
    - assets/sounds/
    - assets/music/
